<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣國中教育會考｜英語科題庫</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f59e0b;
      --gray-50: #f9fafb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: var(--gray-100);
      color: var(--gray-800);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: white;
      padding: 1.25rem 1.5rem;
      box-shadow: 0 2px 8px rgba(79,70,229,0.3);
    }
    header .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: -0.01em; }
    header p { font-size: 0.8rem; opacity: 0.85; margin-top: 0.1rem; }
    .mode-toggle { display: flex; gap: 0.5rem; }
    .mode-btn {
      padding: 0.35rem 0.85rem;
      border-radius: 6px;
      border: 1.5px solid rgba(255,255,255,0.5);
      background: transparent;
      color: white;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    .mode-btn.active { background: white; color: var(--primary); border-color: white; }

    /* Nav tabs */
    nav {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      gap: 0;
      overflow-x: auto;
    }
    nav::-webkit-scrollbar { height: 0; }
    nav button {
      background: none;
      border: none;
      padding: 0.9rem 1.25rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--gray-500);
      border-bottom: 2.5px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
    }
    nav button:hover { color: var(--primary); }
    nav button.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Main container */
    .container { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

    /* Card */
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--gray-700);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 1.25rem;
      padding: 1rem;
      background: white;
      border-radius: 10px;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat .num { font-size: 1.5rem; font-weight: 800; color: var(--primary); line-height: 1.2; }
    .stat .label { font-size: 0.7rem; color: var(--gray-500); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }

    /* Year grid */
    .year-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(75px, 1fr));
      gap: 0.5rem;
    }
    .year-cell {
      text-align: center;
      padding: 0.75rem 0.25rem;
      background: var(--gray-50);
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .year-cell:hover { border-color: var(--primary); background: #eff6ff; transform: translateY(-1px); }
    .year-cell .y-num { font-size: 0.7rem; color: var(--gray-500); }
    .year-cell .y-count { font-size: 1.4rem; font-weight: 800; color: var(--primary); line-height: 1.3; }
    .year-cell:hover .y-count { color: var(--primary-dark); }

    /* Concept tags */
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      border: 1.5px solid var(--gray-200);
      background: var(--gray-50);
      color: var(--gray-700);
      transition: all 0.15s;
    }
    .tag:hover { border-color: var(--primary); color: var(--primary); background: #eff6ff; }
    .tag.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Filter section */
    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .filter-group label { display: block; font-size: 0.75rem; color: var(--gray-500); margin-bottom: 0.25rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
    .filter-group select, .filter-group input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1.5px solid var(--gray-200);
      border-radius: 8px;
      font-size: 0.875rem;
      background: white;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter-group select:focus, .filter-group input:focus { outline: none; border-color: var(--primary); }

    /* Buttons */
    .btn { padding: 0.55rem 1.1rem; border-radius: 8px; font-size: 0.875rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 0.4rem; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-outline { background: white; border: 1.5px solid var(--gray-200); color: var(--gray-700); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Question card in list */
    .q-card {
      background: white;
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 0.6rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .q-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(79,70,229,0.1); transform: translateY(-1px); }
    .q-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; flex-wrap: wrap; gap: 0.4rem; }
    .q-card-header .left { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
    .badge { padding: 0.2rem 0.55rem; border-radius: 5px; font-size: 0.7rem; font-weight: 700; }
    .badge-year { background: #dbeafe; color: #1e40af; }
    .badge-type { background: #dcfce7; color: #166534; }
    .badge-difficulty-basic { background: #dcfce7; color: #166534; }
    .badge-difficulty-medium { background: #fef3c7; color: #92400e; }
    .badge-difficulty-difficult { background: #fee2e2; color: #991b1b; }
    .badge-group { background: #f3e8ff; color: #7c3aed; }
    .badge-answer-yes { background: #d1fae5; color: #065f46; font-size: 0.68rem; }
    .badge-answer-no { background: #f3f4f6; color: #6b7280; font-size: 0.68rem; }
    .q-card-qtext { font-size: 0.875rem; color: var(--gray-700); line-height: 1.5; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .q-card-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.4rem; }
    .q-card-concepts { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .concept-pill { padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.68rem; background: var(--gray-100); color: var(--gray-600); font-weight: 500; }
    .passage-indicator { display: flex; align-items: center; gap: 0.3rem; font-size: 0.75rem; color: #7c3aed; font-weight: 600; }

    /* Practice view */
    .practice-container { max-width: 700px; margin: 0 auto; }
    .progress-header { margin-bottom: 1rem; }
    .progress-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; font-size: 0.875rem; color: var(--gray-700); font-weight: 500; }
    .progress-bar-wrap { height: 6px; background: var(--gray-200); border-radius: 999px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #818cf8); border-radius: 999px; transition: width 0.3s; }

    .passage-box {
      background: #fefce8;
      border: 1.5px solid #fbbf24;
      border-radius: 10px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      line-height: 1.75;
      color: var(--gray-800);
      max-height: 260px;
      overflow-y: auto;
      white-space: pre-wrap;
      position: relative;
    }
    .passage-box .passage-label { font-size: 0.7rem; font-weight: 700; color: #92400e; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.3rem; }
    .passage-box .group-nav { font-size: 0.75rem; color: #7c3aed; font-weight: 600; margin-top: 0.5rem; }
    .group-nav a { color: #7c3aed; cursor: pointer; text-decoration: underline; margin: 0 0.3rem; }

    .question-box { background: white; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .question-meta { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.75rem; align-items: center; }
    .question-text { font-size: 1rem; line-height: 1.75; margin-bottom: 1rem; color: var(--gray-900); font-weight: 500; white-space: pre-wrap; }

    .options-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .option-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.8rem 1rem;
      border: 2px solid var(--gray-200);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .option-item:hover:not(.locked) { border-color: var(--primary); background: #eff6ff; }
    .option-item.selected { border-color: var(--primary); background: #dbeafe; }
    .option-item.correct { border-color: var(--success); background: #dcfce7; }
    .option-item.wrong { border-color: var(--danger); background: #fee2e2; }
    .option-item.locked { cursor: default; }
    .opt-label { font-weight: 800; min-width: 1.6rem; height: 1.6rem; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: var(--gray-100); font-size: 0.85rem; flex-shrink: 0; }
    .option-item.selected .opt-label { background: var(--primary); color: white; }
    .option-item.correct .opt-label { background: var(--success); color: white; }
    .option-item.wrong .opt-label { background: var(--danger); color: white; }

    .practice-nav { display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }
    .jump-input { display: flex; align-items: center; gap: 0.4rem; font-size: 0.875rem; color: var(--gray-600); }
    .jump-input input { width: 3rem; padding: 0.3rem 0.5rem; border: 1.5px solid var(--gray-200); border-radius: 6px; text-align: center; font-size: 0.875rem; }

    /* Reveal hint */
    .reveal-section { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--gray-200); }
    .reveal-btn { font-size: 0.8rem; color: var(--gray-500); cursor: pointer; background: none; border: none; padding: 0; text-decoration: underline; }
    .reveal-content { margin-top: 0.5rem; padding: 0.75rem; background: var(--gray-50); border-radius: 8px; font-size: 0.85rem; color: var(--gray-700); display: none; }
    .reveal-content.show { display: block; }

    /* Result screen */
    .result-card { background: white; border-radius: 16px; padding: 2rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 420px; margin: 2rem auto; }
    .result-score { font-size: 4rem; font-weight: 900; color: var(--primary); line-height: 1; }
    .result-score span { font-size: 1.5rem; color: var(--gray-500); font-weight: 600; }
    .result-detail { margin: 1.5rem 0; display: flex; justify-content: center; gap: 2rem; }
    .result-detail-item .rd-num { font-size: 1.5rem; font-weight: 700; }
    .result-detail-item .rd-label { font-size: 0.75rem; color: var(--gray-500); }
    .result-actions { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }

    /* Preview modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal { background: white; border-radius: 14px; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--gray-200); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 1rem; }
    .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-500); line-height: 1; }
    .modal-body { padding: 1.25rem; }

    /* Print */
    @media print {
      @page { size: A4; margin: 1.5cm 2cm; }
      header, nav, .practice-nav, .btn, .reveal-section { display: none !important; }
      body { background: white; font-size: 13px; }
      .card, .question-box { box-shadow: none; border: 1px solid #ccc; break-inside: avoid; }
    }

    /* Mobile */
    @media (max-width: 640px) {
      .container { padding: 1rem 0.75rem; }
      .stats-bar { gap: 0.75rem; }
      .stat .num { font-size: 1.25rem; }
      .filters-grid { grid-template-columns: repeat(2, 1fr); }
      .year-grid { grid-template-columns: repeat(4, 1fr); }
      header h1 { font-size: 1rem; }
      .mode-toggle { display: none; }
    }

    /* About page */
    .about-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; }
    .about-type-item { padding: 0.75rem; background: var(--gray-50); border-radius: 8px; border: 1.5px solid var(--gray-200); }
    .about-type-item .at-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
    .about-type-item .at-count { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .about-type-item .at-desc { font-size: 0.75rem; color: var(--gray-500); margin-top: 0.2rem; }
    .concept-table { width: 100%; border-collapse: collapse; }
    .concept-table th { text-align: left; padding: 0.5rem 0.75rem; background: var(--gray-100); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--gray-500); border-bottom: 2px solid var(--gray-200); }
    .concept-table td { padding: 0.6rem 0.75rem; border-bottom: 1px solid var(--gray-100); font-size: 0.875rem; }
    .concept-table tr:hover td { background: #f8fafc; }

    /* Loading */
    .loading { text-align: center; padding: 3rem; color: var(--gray-500); }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--gray-200); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>📝 國中教育會考｜英語科題庫</h1>
      <p>102–114年度 · 575題 · 專業審核</p>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-study" onclick="setMode('study')">📖 學習</button>
      <button class="mode-btn" id="mode-test" onclick="setMode('test')">⏱️ 練習</button>
    </div>
  </div>
</header>

<nav id="mainNav">
  <button class="active" data-view="home" onclick="navigate('home')">首頁</button>
  <button data-view="filter" onclick="navigate('filter')">🔍 選題</button>
  <button data-view="list" onclick="navigate('list')">📋 列表</button>
  <button data-view="about" onclick="navigate('about')">ℹ️ 關於</button>
</nav>

<div class="container">
  <div id="app"></div>
</div>

<script>
// ====== DATA ======
let ALL_QUESTIONS = [];
let FILTERED = [];
let LOADED = false;
let currentView = 'home';
let currentMode = 'study'; // 'study' or 'test'

// Quiz state
let QS = { questions: [], current: 0, answers: {}, revealed: [], startTime: 0, mode: 'study' };

// ====== INIT ======
async function init() {
  try {
    const res = await fetch('./data/exam-questions.json');
    if (!res.ok) throw new Error('Failed to load');
    const data = await res.json();
    ALL_QUESTIONS = data;
    LOADED = true;
    navigate('home');
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading"><div class="spinner"></div><p>載入失敗，請確認網路連線後重新整理。</p></div>';
    console.error(e);
  }
}

function $ (sel) { return document.querySelector(sel); }
function $$ (sel) { return document.querySelectorAll(sel); }

// ====== NAVIGATION ======
function navigate(view) {
  currentView = view;
  $$('nav button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
  render();
}

function setMode(mode) {
  currentMode = mode;
  QS.mode = mode;
  $('#mode-study').classList.toggle('active', mode === 'study');
  $('#mode-test').classList.toggle('active', mode === 'test');
}

// ====== RENDER ======
function render() {
  const app = $('#app');
  if (!LOADED) { app.innerHTML = '<div class="loading"><div class="spinner"></div><p>載入題庫中...</p></div>'; return; }
  switch (currentView) {
    case 'home': renderHome(); break;
    case 'filter': renderFilter(); break;
    case 'list': renderList(); break;
    case 'about': renderAbout(); break;
    case 'practice': renderPractice(); break;
    case 'result': renderResult(); break;
  }
}

// ====== HOME ======
function renderHome() {
  const total = ALL_QUESTIONS.length;
  const withAns = ALL_QUESTIONS.filter(q => q.answer).length;
  const years = {};
  ALL_QUESTIONS.forEach(q => { years[q.year] = (years[q.year]||0)+1; });
  const yearKeys = Object.keys(years).sort();
  const concepts = [...new Set(ALL_QUESTIONS.flatMap(q => q.concepts||[]))].filter(Boolean);

  $('#app').innerHTML = `
  <div class="stats-bar">
    <div class="stat"><div class="num">${total}</div><div class="label">總題數</div></div>
    <div class="stat"><div class="num">${withAns}</div><div class="label">有答案</div></div>
    <div class="stat"><div class="num">${yearKeys.length}</div><div class="label">年度</div></div>
    <div class="stat"><div class="num">${concepts.length}</div><div class="label">概念</div></div>
  </div>

  <div class="card">
    <div class="card-title">📅 依年度選題</div>
    <div class="year-grid">
      ${yearKeys.map(y => `
      <div class="year-cell" onclick="startQuizByYear(${y})">
        <div class="y-num">${y}年</div>
        <div class="y-count">${years[y]}</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏷️ 學習概念</div>
    <div class="tag-list">
      ${concepts.map(c => `<span class="tag" onclick="startQuizByConcept('${esc(c)}')">${c}</span>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">🔍 條件選題</div>
    <div class="btn-group" style="display:flex;gap:0.6rem;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="navigate('filter')">🔍 進階篩選</button>
      <button class="btn btn-outline" onclick="navigate('list')">📋 瀏覽列表</button>
    </div>
  </div>`;
}

// ====== FILTER ======
let F = { year:'', type:'', difficulty:'', concept:'', hasAnswer:'' };

function clearFilters() {
  F = { year:'', type:'', difficulty:'', concept:'', hasAnswer:'' };
  renderFilter();
}

function applyFilter() {
  FILTERED = ALL_QUESTIONS.filter(q => {
    if (F.year && q.year != F.year) return false;
    if (F.type && q.type !== F.type) return false;
    if (F.difficulty && q.difficulty !== F.difficulty) return false;
    if (F.concept && !(q.concepts||[]).includes(F.concept)) return false;
    if (F.hasAnswer === 'yes' && !q.answer) return false;
    if (F.hasAnswer === 'no' && q.answer) return false;
    return true;
  });
}

function renderFilter() {
  const years = [...new Set(ALL_QUESTIONS.map(q=>q.year))].sort();
  const types = [...new Set(ALL_QUESTIONS.map(q=>q.type).filter(Boolean))].sort();
  const difficulties = [...new Set(ALL_QUESTIONS.map(q=>q.difficulty).filter(Boolean))].sort();
  const concepts = [...new Set(ALL_QUESTIONS.flatMap(q=>q.concepts||[]))].filter(Boolean).sort();

  applyFilter();

  $('#app').innerHTML = `
  <div class="card">
    <div class="card-title">🔍 條件篩選</div>
    <div class="filters-grid">
      <div class="filter-group">
        <label>年度</label>
        <select id="fi-year" onchange="F.year=this.value;applyFilter();renderFilter();">
          <option value="">全部</option>
          ${years.map(y=>`<option value="${y}" ${F.year==y?'selected':''}>${y}年</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <label>題型</label>
        <select id="fi-type" onchange="F.type=this.value;applyFilter();renderFilter();">
          <option value="">全部</option>
          ${types.map(t=>`<option value="${t}" ${F.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <label>難度</label>
        <select id="fi-difficulty" onchange="F.difficulty=this.value;applyFilter();renderFilter();">
          <option value="">全部</option>
          ${difficulties.map(d=>`<option value="${d}" ${F.difficulty===d?'selected':''}>${d}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group">
        <label>答案</label>
        <select id="fi-answer" onchange="F.hasAnswer=this.value;applyFilter();renderFilter();">
          <option value="">全部</option>
          <option value="yes" ${F.hasAnswer==='yes'?'selected':''}>有答案</option>
          <option value="no" ${F.hasAnswer==='no'?'selected':''}>無答案</option>
        </select>
      </div>
    </div>
    <div class="filter-group" style="margin-bottom:0.75rem;">
      <label>學習概念</label>
      <select id="fi-concept" onchange="F.concept=this.value;applyFilter();renderFilter();">
        <option value="">全部概念</option>
        ${concepts.map(c=>`<option value="${esc(c)}" ${F.concept===c?'selected':''}>${c}</option>`).join('')}
      </select>
    </div>
    <div class="tag-list">
      ${concepts.map(c=>`<span class="tag ${F.concept===c?'active':''}" onclick="F.concept='${esc(c)}';applyFilter();renderFilter();">${c}</span>`).join('')}
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
      <span style="font-weight:700;">找到 <span style="color:var(--primary);font-size:1.2rem;">${FILTERED.length}</span> 題</span>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" onclick="startQuiz(FILTERED)" ${FILTERED.length===0?'disabled':''}>▶ 開始</button>
        <button class="btn btn-outline btn-sm" onclick="previewQuiz(FILTERED)" ${FILTERED.length===0?'disabled':''}>👁 預覽</button>
        <button class="btn btn-outline btn-sm" onclick="printQuiz(FILTERED)" ${FILTERED.length===0?'disabled':''}>🖨 列印</button>
      </div>
    </div>
    ${FILTERED.length === 0 ? '<p style="color:var(--gray-500);text-align:center;padding:1rem;">沒有符合的題目，請調整篩選條件</p>' :
    FILTERED.slice(0,5).map((q,i)=>renderQCard(q,i)).join('') +
    (FILTERED.length > 5 ? `<p style="text-align:center;color:var(--gray-500);font-size:0.8rem;margin-top:0.75rem;">還有 ${FILTERED.length-5} 題...</p>` : '')
    }
  </div>`;
}

// ====== LIST ======
function renderList() {
  const years = [...new Set(ALL_QUESTIONS.map(q=>q.year))].sort();
  $('#app').innerHTML = `
  <div class="card">
    <div class="card-title">📋 題庫列表（${ALL_QUESTIONS.length}題）</div>
  </div>
  ${years.map(y => {
    const qs = ALL_QUESTIONS.filter(q=>q.year===y);
    return `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <div class="card-title" style="margin:0;">${y}年度</div>
        <button class="btn btn-primary btn-sm" onclick="startQuizByYear(${y})">▶ 開始作答</button>
      </div>
      ${qs.map((q,i)=>renderQCard(q,i)).join('')}
    </div>`;
  }).join('')}`;
}

// ====== Q CARD ======
function renderQCard(q, idx) {
  const typeLabel = {'vocabulary':'詞彙','grammar':'文法','reading':'閱讀','cloze':'克漏字','conversation':'對話'}[q.type] || q.type;
  const diffClass = q.difficulty ? `badge-difficulty-${q.difficulty}` : '';
  const hasAns = q.answer ? 'badge-answer-yes' : 'badge-answer-no';
  const ansLabel = q.answer ? '✓有答案' : '✗無';
  const groupBadge = q.group_id ? `<span class="badge badge-group">題組${q.group_id}</span>` : '';
  const passageTag = q.passage ? '<span class="passage-indicator">📄</span>' : '';
  return `
  <div class="q-card" onclick="startQuizAt(${ALL_QUESTIONS.indexOf(q)})">
    <div class="q-card-header">
      <div class="left">
        <span class="badge badge-year">${q.year}年</span>
        <span class="badge badge-type">${typeLabel}</span>
        ${q.difficulty ? `<span class="badge ${diffClass}">${q.difficulty}</span>` : ''}
        ${groupBadge}
      </div>
      <div style="display:flex;gap:0.3rem;align-items:center;">
        ${passageTag}
        <span class="badge ${hasAns}">${ansLabel}</span>
      </div>
    </div>
    <div class="q-card-qtext">${escHtml(q.question||'')}</div>
    <div class="q-card-footer">
      <div class="q-card-concepts">
        ${(q.concepts||[]).map(c=>`<span class="concept-pill">${c}</span>`).join('')}
      </div>
    </div>
  </div>`;
}

// ====== PRACTICE ======
function startQuiz(questions) {
  QS = { questions, current: 0, answers: {}, revealed: new Array(questions.length).fill(false), startTime: Date.now(), mode: currentMode };
  navigate('practice');
}

function startQuizByYear(year) {
  const qs = ALL_QUESTIONS.filter(q => q.year == year);
  if (!qs.length) { alert('該年份沒有題目'); return; }
  startQuiz(qs);
}

function startQuizByConcept(concept) {
  const qs = ALL_QUESTIONS.filter(q => (q.concepts||[]).includes(concept));
  if (!qs.length) { alert('沒有符合的題目'); return; }
  startQuiz(qs);
}

function startQuizAt(index) {
  // Find which quiz set this question belongs to - just start from index with nearby context
  // For simplicity, just start a quiz of nearby questions
  const q = ALL_QUESTIONS[index];
  const qs = ALL_QUESTIONS.filter(q2 => q2.year === q.year);
  const startIdx = qs.findIndex(x => ALL_QUESTIONS.indexOf(x) === index);
  startQuiz(qs.slice(Math.max(0,startIdx-2), startIdx+8));
}

function previewQuiz(questions) {
  startQuiz(questions.slice(0, Math.min(questions.length, 5)));
}

function renderPractice() {
  const { questions, current, answers, revealed } = QS;
  if (current >= questions.length) { navigate('result'); return; }
  const q = questions[current];
  const total = questions.length;
  const progress = (current / total) * 100;
  const selected = answers[current];
  const isRevealed = revealed[current];

  // Find group siblings
  let groupSiblings = [];
  if (q.group_id) {
    groupSiblings = questions.filter(q2 => q2.group_id === q.group_id && q2 !== q);
  }

  const typeLabel = {'vocabulary':'詞彙','grammar':'文法','reading':'閱讀','cloze':'克漏字','conversation':'對話'}[q.type] || q.type;
  const diffClass = q.difficulty ? `badge-difficulty-${q.difficulty}` : '';

  $('#app').innerHTML = `
  <div class="practice-container">
    <div class="progress-header">
      <div class="progress-header-top">
        <span>第 ${current+1} / ${total} 題</span>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          ${q.group_id ? `<span class="badge badge-group">題組 ${q.group_id}</span>` : ''}
          <span class="badge badge-year">${q.year}年</span>
        </div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
    </div>

    ${q.passage ? `
    <div class="passage-box">
      <div class="passage-label">📄 文章</div>
      ${escHtml(q.passage)}
      ${groupSiblings.length ? `<div class="group-nav">同組題目：${groupSiblings.map((s,i)=>`<a onclick="jumpToGroup('${s.id}')">第${questions.indexOf(s)+1}題</a>`).join('')}</div>` : ''}
    </div>` : ''}

    <div class="question-box">
      <div class="question-meta">
        <span class="badge badge-type">${typeLabel}</span>
        ${q.difficulty ? `<span class="badge ${diffClass}">${q.difficulty}</span>` : ''}
        ${(q.concepts||[]).map(c=>`<span class="badge" style="background:var(--gray-100);color:var(--gray-600);">${c}</span>`).join('')}
      </div>
      <div class="question-text">${escHtml(q.question||'')}</div>
      <div class="options-list">
        ${Object.entries(q.options||{}).filter(([k])=>k!=='passage').map(([k,v]) => {
          let cls = 'option-item';
          let locked = '';
          if (selected && (isRevealed || QS.mode === 'study')) {
            locked = 'locked';
            if (q.answer === k) cls += ' correct';
            else if (selected === k && k !== q.answer) cls += ' wrong';
          } else if (selected === k) {
            cls += ' selected';
          }
          return `<div class="${cls} ${locked}" onclick="pickOption('${k}')">
            <span class="opt-label">${k}</span>
            <span>${escHtml(v)}</span>
          </div>`;
        }).join('')}
      </div>

      ${currentMode === 'study' && isRevealed ? `
      <div class="reveal-section">
        <div class="reveal-content show">
          <strong>✅ 正確答案：${q.answer}</strong>
          ${q.concepts && q.concepts.length ? `<div style="margin-top:0.4rem;">學習概念：${q.concepts.join('、')}</div>` : ''}
          ${q.note ? `<div style="margin-top:0.3rem;color:var(--gray-500);">${escHtml(q.note)}</div>` : ''}
        </div>
      </div>` : ''}
    </div>

    <div class="practice-nav">
      <button class="btn btn-outline btn-sm" onclick="prevQ()" ${current===0?'disabled':''}>◀ 上一題</button>
      <div class="jump-input">
        跳至 <input type="number" min="1" max="${total}" value="${current+1}" onchange="jumpTo(this.value-1)"> 題
      </div>
      ${currentMode === 'study' && !isRevealed && selected ? `
        <button class="btn btn-sm" style="background:#fef3c7;color:#92400e;border:1.5px solid #fbbf24;" onclick="revealAns()">💡 揭曉答案</button>
      ` : ''}
      <button class="btn btn-primary btn-sm" onclick="nextQ()" ${current===total-1?'disabled':''}>下一題 ▶</button>
    </div>

    <div style="margin-top:1rem;text-align:center;">
      <button class="btn btn-outline btn-sm" onclick="navigate('result')">📊 查看成績</button>
    </div>
  </div>`;
}

function pickOption(k) {
  const { questions, current, revealed } = QS;
  if (revealed[current] && QS.mode === 'study') return; // locked in study mode after reveal
  QS.answers[current] = k;
  renderPractice();
}

function revealAns() {
  QS.revealed[QS.current] = true;
  renderPractice();
}

function nextQ() {
  if (QS.current < QS.questions.length - 1) {
    QS.current++;
    renderPractice();
  }
}

function prevQ() {
  if (QS.current > 0) {
    QS.current--;
    renderPractice();
  }
}

function jumpTo(idx) {
  if (idx >= 0 && idx < QS.questions.length) {
    QS.current = idx;
    renderPractice();
  }
}

function jumpToGroup(id) {
  const idx = QS.questions.findIndex(q => q.id === id);
  if (idx >= 0) { QS.current = idx; renderPractice(); }
}

// ====== RESULT ======
function renderResult() {
  const { questions, answers, revealed, startTime, mode } = QS;
  const total = questions.length;
  const answered = Object.keys(answers).length;
  const elapsed = Math.round((Date.now() - startTime) / 1000);

  let correct = 0;
  questions.forEach((q, i) => {
    if (answers[i] && answers[i] === q.answer) correct++;
  });
  const score = total > 0 ? Math.round(correct / total * 100) : 0;
  const wrong = answered - correct;

  const scoreColor = score >= 80 ? 'var(--success)' : score >= 60 ? 'var(--warning)' : 'var(--danger)';

  $('#app').innerHTML = `
  <div class="result-card">
    <div style="font-size:0.85rem;color:var(--gray-500);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:0.5rem;">你的得分</div>
    <div class="result-score" style="color:${scoreColor};">${score}<span>%</span></div>
    <div class="result-detail">
      <div class="result-detail-item"><div class="rd-num" style="color:var(--success);">${correct}</div><div class="rd-label">答對</div></div>
      <div class="result-detail-item"><div class="rd-num" style="color:var(--danger);">${wrong}</div><div class="rd-label">答錯</div></div>
      <div class="result-detail-item"><div class="rd-num" style="color:var(--gray-500);">${answered}/${total}</div><div class="rd-label">已作答</div></div>
    </div>
    ${mode === 'test' ? `<div style="font-size:0.85rem;color:var(--gray-500);margin-bottom:1.5rem;">⏱ 用時 ${elapsed} 秒</div>` : ''}
    <div class="result-actions">
      <button class="btn btn-primary" onclick="startQuiz(questions)">🔄 再試一次</button>
      <button class="btn btn-outline" onclick="navigate('home')">🏠 回首頁</button>
    </div>
  </div>`;
}

// ====== ABOUT ======
function renderAbout() {
  const concepts = [...new Set(ALL_QUESTIONS.flatMap(q=>q.concepts||[]))].filter(Boolean);
  const typeMap = {'vocabulary':'詞彙題','grammar':'文法題','reading':'閱讀題','cloze':'克漏字','conversation':'對話題'};
  const typeCounts = {};
  ALL_QUESTIONS.forEach(q => { typeCounts[q.type] = (typeCounts[q.type]||0)+1; });

  const conceptDescs = {
    '詞義理解':'理解單字或情境中的詞義（word meaning / contextual meaning）',
    '閱讀推理':'根據文章資訊推斷答案（reading inference）',
    '對話理解':'理解對話情境與言外之意（dialogue understanding）',
    '過去式':'過去式的時態與用法（past simple）',
    '現在式':'現在式的時態與用法（present simple / continuous）',
    '現在完成式':'現在完成式的時態與用法（present perfect）',
    '未來式':'未來式（will / be going to）',
    '比較級與最高級':'形容詞與副詞的比較變化',
    '代名詞':'各類代名詞的用法（主格、受格、所有格、反身等）',
    '介係詞':'時間、地點、方向介係詞的用法',
    '數量詞與片語':'數量詞與片語動詞',
    '克漏字':'克漏字題組（cloze test）',
    '主旨與細節':'文章主旨與細節擷取（main idea / detail）'
  };

  $('#app').innerHTML = `
  <div class="card">
    <div class="card-title">ℹ️ 關於本題庫</div>
    <p style="line-height:1.8;color:var(--gray-700);margin-bottom:1rem;">
      收錄台灣 <strong>102–114年度</strong> 國中教育會考英語科試題，共 <strong>${ALL_QUESTIONS.length}題</strong>，
      由專業英文教師補正與審查。屬教育研究者約翰·陳所有。
    </p>
    <div style="display:flex;flex-wrap:wrap;gap:0.75rem;margin-bottom:1rem;">
      <button class="btn btn-outline btn-sm" onclick="navigate('filter')">🔍 篩選題目</button>
      <button class="btn btn-outline btn-sm" onclick="printQuiz(ALL_QUESTIONS)">🖨 列印整份</button>
    </div>
    <p style="font-size:0.8rem;color:var(--gray-500);line-height:1.7;">
      ⚠️ 部分圖片題、聽力題無文字內容，屬原始試卷限制，答案維持空白。
    </p>
  </div>

  <div class="card">
    <div class="card-title">📊 題型分布</div>
    <div class="about-grid">
      ${Object.entries(typeCounts).map(([t,c]) => `
      <div class="about-type-item">
        <div class="at-name">${typeMap[t]||t}</div>
        <div class="at-count">${c}</div>
        <div class="at-desc">${Math.round(c/ALL_QUESTIONS.length*100)}%</div>
      </div>`).join('')}
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏷️ 學習概念（${concepts.length}類）</div>
    <table class="concept-table">
      <thead><tr><th>概念</th><th>說明</th><th style="text-align:right;">題數</th></tr></thead>
      <tbody>
        ${concepts.map(c => {
          const cnt = ALL_QUESTIONS.filter(q=>(q.concepts||[]).includes(c)).length;
          return `<tr><td><strong>${c}</strong></td><td style="color:var(--gray-500);font-size:0.8rem;">${conceptDescs[c]||''}</td><td style="text-align:right;font-weight:700;color:var(--primary);">${cnt}</td></tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;
}

// ====== PRINT ======
window.printQuiz = function(questions) {
  const count = questions.length;
  let html = `<div style="max-width:700px;margin:0 auto;padding:1rem 0;font-family:'Noto Sans TC',sans-serif;">`;
  html += `<h1 style="text-align:center;font-size:1.3rem;margin-bottom:0.25rem;">台灣國中教育會考｜英語科練習卷</h1>`;
  html += `<p style="text-align:center;color:#666;font-size:0.85rem;margin-bottom:1.5rem;">共 ${count} 題</p>`;

  questions.forEach((q, idx) => {
    const num = idx + 1;
    const opts = Object.entries(q.options||{}).filter(([k])=>k!=='passage');
    html += `<div style="margin-bottom:1.5rem;page-break-inside:avoid;padding:0.75rem;border:1px solid #e5e7eb;border-radius:8px;">`;
    html += `<div style="font-weight:700;margin-bottom:0.5rem;">${num}. <span style="background:#dbeafe;color:#1e40af;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.75rem;">${q.year}年</span> <span style="background:#f3f4f6;color:#666;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.75rem;">${q.type}</span></div>`;
    if (q.passage) html += `<div style="background:#fefce8;border:1px solid #fbbf24;border-radius:6px;padding:0.5rem 0.75rem;margin-bottom:0.5rem;font-size:0.85rem;white-space:pre-wrap;">${escHtml(q.passage)}</div>`;
    html += `<div style="margin-bottom:0.5rem;line-height:1.7;font-size:0.95rem;white-space:pre-wrap;">${escHtml(q.question||'')}</div>`;
    opts.forEach(([k,v]) => { html += `<div style="display:flex;gap:0.5rem;line-height:1.6;font-size:0.9rem;margin-bottom:0.25rem;"><strong style="min-width:1.2rem;">(${k})</strong><span>${escHtml(v)}</span></div>`; });
    html += `</div>`;
  });

  // Answer key
  html += `<div style="page-break-before:always;margin-top:2rem;padding-top:1rem;border-top:2px solid #333;">`;
  html += `<h2 style="text-align:center;font-size:1.1rem;margin-bottom:1rem;">解答</h2><div style="display:grid;grid-template-columns:repeat(10,1fr);gap:0.4rem;">`;
  questions.forEach((q,i) => { html += `<div style="text-align:center;padding:0.3rem;border:1px solid #ddd;border-radius:4px;"><div style="font-size:0.7rem;color:#999;">${i+1}</div><div style="font-weight:700;font-size:1rem;">${q.answer||'?'}</div></div>`; });
  html += `</div></div></div>`;

  const w = window.open('','','width=750,height=900');
  w.document.write(`<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8"><title>英語科練習卷</title><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"><style>body{font-family:'Noto Sans TC',sans-serif;} @media print{@page{size:A4;margin:1.5cm 2cm;}}</style></head><body>${html}<script>window.onload=function(){window.print();};<\/script></body></html>`);
  w.document.close();
};

// ====== UTILS ======
function esc(s) { return String(s).replace(/'/g, "\\'").replace(/\n/g, '\\n'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ====== START ======
init();
</script>
</body>
</html>
