<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>台灣國中教育會考｜英語科題庫</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>📝 國中教育會考｜英語科題庫</h1>
      <p>102–114年度 · 575題 · 專業審核</p>
    </div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="mode-study" onclick="setMode('study')">📖 學習</button>
      <button class="mode-btn" id="mode-test" onclick="setMode('test')">⏱️ 練習</button>
    </div>
  </div>
</header>

<nav id="mainNav">
  <button class="active" data-view="home" onclick="navigate('home')">首頁</button>
  <button data-view="filter" onclick="navigate('filter')">🔍 選題</button>
  <button data-view="list" onclick="navigate('list')">📋 列表</button>
  <button data-view="wrong" onclick="navigate('wrong')">📝 錯題</button>
  <button data-view="stats" onclick="navigate('stats')">📊 統計</button>
  <button data-view="about" onclick="navigate('about')">ℹ️ 關於</button>
</nav>

<div class="container">
  <div id="app"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
